<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile – Nexio</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .profile-container {
            padding: 120px 24px 60px;
            max-width: 600px;
            margin: 0 auto;
        }

        .profile-card {
            background: var(--white);
            border-radius: 32px;
            padding: 48px;
            box-shadow: var(--shadow-lg);
            text-align: center;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--primary), #818CF8);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0 auto 24px;
            font-family: 'Outfit';
        }

        .profile-info {
            text-align: left;
            margin-top: 32px;
            background: #F8FAFC;
            padding: 24px;
            border-radius: 20px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            border-bottom: 1px solid #E2E8F0;
            padding-bottom: 8px;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            color: var(--text-secondary);
            font-weight: 500;
        }

        .info-value {
            font-weight: 600;
        }
    </style>
</head>

<body style="background: var(--bg-color);">

    <nav id="navbar" class="scrolled">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i data-lucide="layers"></i>
                <span>Nexio</span>
            </a>
            <ul class="nav-links">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="history.html">History</a></li>
            </ul>
            <div class="nav-btns" id="navAuthBtns"></div>
        </div>
    </nav>

    <div class="profile-container">
        <div class="profile-card">
            <div class="profile-avatar" id="avatarCircle">U</div>
            <h1 id="prof-name">User Name</h1>
            <p style="color: var(--text-secondary);" id="prof-tag">nexio user</p>

            <div class="profile-info">
                <div class="info-item">
                    <span class="info-label">Email</span>
                    <span class="info-value" id="prof-email">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Phone</span>
                    <span class="info-value" id="prof-phone">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Member Since</span>
                    <span class="info-value">March 2026</span>
                </div>
            </div>

            <div style="margin-top: 32px; display: flex; flex-direction: column; gap: 12px;">
                <button class="btn btn-primary" style="width: 100%;" onclick="alert('Edit Profile Coming Soon')">Edit
                    Profile</button>
                <button class="btn btn-white" style="width: 100%; border: 1px solid #E2E8F0;" onclick="logout()">Log
                    Out</button>
            </div>
        </div>
    </div>

    <!-- Simple Footer -->
    <footer style="margin-top: 80px; padding: 40px 0; border-top: 1px solid #E2E8F0; text-align: center;">
        <div class="container"
            style="display: flex; justify-content: center; gap: 40px; font-size: 0.9rem; color: var(--text-secondary);">
            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="agent_login.html" style="font-weight: 600;">Agent Login</a>
            <a href="admin_login.html" style="font-weight: 600;">Admin Login</a>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script>
        lucide.createIcons();

        function loadProfile() {
            const userStr = localStorage.getItem('user');
            if (userStr) {
                const user = JSON.parse(userStr);
                document.getElementById('prof-name').innerText = user.name;
                document.getElementById('prof-email').innerText = user.email;
                document.getElementById('prof-phone').innerText = user.phone;
                document.getElementById('avatarCircle').innerText = user.name.charAt(0).toUpperCase();
            } else {
                window.location.href = 'login.html';
            }
        }

        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        loadProfile();
    </script>
</body>

</html>
