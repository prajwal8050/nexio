<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexio – Smart Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .dashboard-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            background: var(--white);
            border-right: 1px solid #E2E8F0;
            padding: 32px 20px;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            padding: 24px 40px;
            background: #F8FAFC;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .active-queue-hero {
            background: linear-gradient(135deg, var(--primary), #4338CA);
            color: white;
            padding: 32px;
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            margin-bottom: 32px;
            position: relative;
            overflow: hidden;
        }

        .empty-state {
            text-align: center;
            padding: 80px 40px;
            background: white;
            border-radius: 32px;
            border: 2px dashed #E2E8F0;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            border-radius: 12px;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            margin-bottom: 8px;
        }

        .sidebar-link.active {
            background: #EEF2FF;
            color: var(--primary);
        }

        .sidebar-link:hover {
            background: #F1F5F9;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes goldPulse {
            0% {
                box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4);
            }

            70% {
                box-shadow: 0 0 20px 10px rgba(245, 158, 11, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(245, 158, 11, 0);
            }
        }

        .priority-glow {
            border: 2px solid #F59E0B !important;
            animation: goldPulse 2s infinite;
        }

        .priority-badge {
            background: linear-gradient(135deg, #F59E0B, #D97706);
            color: white;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
        }
    </style>
</head>

<body>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <a href="index.html" class="logo" style="margin-bottom: 48px; padding-left: 18px;">
                <i data-lucide="layers" style="color: var(--primary);"></i>
                <span style="font-weight: 800; font-size: 1.5rem;">Nexio</span>
            </a>

            <nav style="flex-grow: 1;">
                <a href="dashboard.html" class="sidebar-link active">
                    <i data-lucide="layout-dashboard"></i> Dashboard
                </a>
                <a href="services.html" class="sidebar-link">
                    <i data-lucide="search"></i> Find Services
                </a>
                <a href="history.html" class="sidebar-link">
                    <i data-lucide="clock"></i> History
                </a>
                <a href="profile.html" class="sidebar-link">
                    <i data-lucide="user"></i> My Profile
                </a>
            </nav>

            <button onclick="logout()" class="sidebar-link"
                style="border: none; background: none; cursor: pointer; color: #EF4444; margin-top: auto;">
                <i data-lucide="log-out"></i> Log Out
            </button>
        </aside>

        <main class="main-content">
            <header class="dashboard-header" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                <h1 style="font-size: 1.75rem;">Welcome, <span class="text-gradient" id="userName">User</span></h1>
                <p style="color: var(--text-secondary); font-size: 0.95rem; opacity: 0.8;">Manage your virtual tokens
                    and tracking in real-time.</p>
            </header>

            <div id="activeTicketContainer">
                <!-- Active Ticket or Empty State -->
                <div class="empty-state">
                    <i data-lucide="calendar"
                        style="width: 48px; height: 48px; color: var(--text-muted); margin-bottom: 16px;"></i>
                    <h3>No Active Queue</h3>
                    <p style="color: var(--text-secondary); margin-bottom: 24px;">You haven't joined any queue yet.</p>
                    <a href="services.html" class="btn btn-primary">Join a Queue</a>
                </div>
            </div>

            <h2 style="margin: 40px 0 24px;">Recent History</h2>
            <div id="recentHistory">
                <!-- History List -->
            </div>

            <footer style="margin-top: 80px; padding: 40px 0; border-top: 1px solid #E2E8F0; text-align: center;">
                <div
                    style="display: flex; justify-content: center; gap: 40px; font-size: 0.9rem; color: var(--text-secondary);">
                    <a href="index.html">Home</a>
                    <a href="services.html">Services</a>
                    <a href="agent_login.html" style="font-weight: 600;">Agent Login</a>
                    <a href="admin_login.html" style="font-weight: 600;">Admin Login</a>
                </div>
            </footer>
        </main>
    </div>

    <script src="js/script.js"></script>
    <script>
        lucide.createIcons();

        function checkUser() {
            const userStr = localStorage.getItem('user');
            if (!userStr) {
                window.location.href = 'login.html';
                return null;
            }
            const user = JSON.parse(userStr);
            document.getElementById('userName').innerText = user.name.split(' ')[0];
            return user;
        }

        let lastNotifiedPeopleAhead = -1;

        async function loadDashboard() {
            const user = checkUser();
            if (!user) return;

            try {
                const response = await fetch('/api/queues/history');
                if (handleAuthError(response)) return;
                const history = await response.json();

                const active = Array.isArray(history) ? history.find(t => t.status === 'WAITING' || t.status === 'SERVING' || t.status === 'AWAY') : null;
                const container = document.getElementById('activeTicketContainer');
                if (!container) return;

                if (active) {
                    const serviceId = active.service ? active.service.id : null;
                    let activePath = [];
                    let serviceHistory = [];

                    if (serviceId) {
                        const pathRes = await fetch(`/api/queues/active-path?serviceId=${serviceId}`).catch(() => null);
                        if (pathRes && pathRes.ok) activePath = await pathRes.json();

                        const historyRes = await fetch(`/api/queues/service/history?serviceId=${serviceId}`).catch(() => null);
                        if (historyRes && historyRes.ok) serviceHistory = await historyRes.json();
                    }

                    const servingTicket = Array.isArray(activePath) ? activePath.find(t => t.status === 'SERVING') : null;
                    const servingNumStr = servingTicket ? servingTicket.queueNumber : "Q0";
                    const servingNum = parseInt(servingNumStr.substring(1)) || 0;
                    const myNumStr = active.queueNumber || "Q0";
                    const myNum = parseInt(myNumStr.substring(1)) || 0;

                    const progress = (servingNum > 0 && myNum > 0) ? Math.min(100, Math.round((servingNum / myNum) * 100)) : 0;

                    const isAway = active.status === 'AWAY';
                    const isPriority = active.priority || false;
                    const waitTime = (active.peopleAhead || 0) * (active.service ? active.service.estimatedWaitTime : 5);

                    container.innerHTML = `
                        <div class="active-queue-hero ${isPriority ? 'priority-glow' : ''}" style="background: ${isPriority ? 'linear-gradient(135deg, #F59E0B, #B45309)' : (isAway ? 'linear-gradient(135deg, #64748B, #334155)' : 'linear-gradient(135deg, #6366F1, #4338CA)')}; border: 1px solid rgba(255,255,255,0.1);">
                            <div style="position: absolute; top: -50px; right: -50px; width: 220px; height: 220px; background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%); border-radius: 50%;"></div>
                            <div style="position: absolute; bottom: -20px; left: 10%; width: 100px; height: 100px; background: rgba(255,255,255,0.05); border-radius: 20px; transform: rotate(45deg);"></div>
                            
                            <div style="display: flex; justify-content: space-between; align-items: flex-start; position: relative; z-index: 1;">
                                <div>
                                    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px;">
                                        <h2 style="color: white; opacity: 0.8; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2.5px; font-weight: 800; margin: 0;">Live Status • ${active.service ? active.service.name : 'Service'}</h2>
                                        ${isPriority ? '<span class="priority-badge"><i data-lucide="zap" style="width:12px;"></i> VIP Priority</span>' : ''}
                                    </div>
                                    <div style="display: flex; align-items: center; gap: 20px;">
                                        <div style="background: rgba(255,255,255,1); color: var(--primary); padding: 10px 24px; border-radius: 20px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);">
                                            <span style="display: block; font-size: 0.65rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">Your Number</span>
                                            <h3 style="font-size: 2.5rem; line-height: 1; margin: 2px 0; color: ${isPriority ? '#B45309' : 'inherit'}">${active.queueNumber}</h3>
                                        </div>
                                        <div style="display: flex; flex-direction: column; gap: 10px;">
                                            <div style="animation: pulse 2s infinite;">
                                                <span style="background: ${active.status === 'SERVING' ? '#22C55E' : (isAway ? '#F59E0B' : 'rgba(255,255,255,0.2)')}; color: white; padding: 6px 16px; border-radius: 99px; font-weight: 700; font-size: 0.85rem; letter-spacing: 1px; border: 1px solid rgba(255,255,255,0.3);">
                                                    ${active.status === 'SERVING' ? 'PROCEED NOW' : (isAway ? 'STATUS: AWAY' : (isPriority ? 'PRIORITY WAITING' : 'WAITING'))}
                                                </span>
                                            </div>
                                            <div style="display: flex; gap: 8px;">
                                                <button onclick="toggleAway(${active.id})" class="btn glass" style="font-size: 0.75rem; padding: 8px 16px; color: white; border: 1px solid rgba(255,255,255,0.4);">
                                                    <i data-lucide="${isAway ? 'play' : 'coffee'}" style="width:14px; margin-right:6px;"></i>
                                                    ${isAway ? "I'm Back" : 'Away'}
                                                </button>
                                                ${!isPriority && active.status === 'WAITING' ? `
                                                    <button onclick="boostTicket(${active.id})" class="btn" style="font-size: 0.75rem; padding: 8px 16px; background: rgba(255,255,255,0.2); color: white; border: 1px dashed white; backdrop-filter: blur(10px);">
                                                        <i data-lucide="zap" style="width:14px; margin-right:6px;"></i>
                                                        Boost Spot
                                                    </button>
                                                ` : ''}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div style="text-align: right; background: rgba(0,0,0,0.1); padding: 16px; border-radius: 20px; backdrop-filter: blur(4px);">
                                    <div style="font-size: 0.65rem; color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600;">Currently Serving</div>
                                    <div style="font-size: 2rem; font-weight: 800; color: #BBF7D0; line-height: 1; margin-top: 4px;">${servingTicket ? servingTicket.queueNumber : '---'}</div>
                                </div>
                            </div>

                            <div style="margin-top: 32px; position: relative; z-index: 1;">
                                <div style="display: flex; justify-content: space-between; margin-bottom: 8px; align-items: flex-end;">
                                    <div style="color: rgba(255,255,255,1); font-weight: 500;">
                                        <span style="font-size: 1.25rem; font-weight: 800; letter-spacing: -0.5px;">${active.peopleAhead}</span> 
                                        <span style="font-size: 0.8rem; opacity: 0.7; margin-left: 2px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px;">people ahead of you</span>
                                    </div>
                                    <div style="text-align: right; color: rgba(255,255,255,0.7);">
                                        <span style="font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">Progress</span>
                                        <div style="font-size: 1rem; font-weight: 800; color: white;">${progress}%</div>
                                    </div>
                                </div>
                                <div class="progress-bar-container" style="background: rgba(255,255,255,0.1); height: 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);">
                                    <div class="progress-bar" style="background: linear-gradient(90deg, #A5B4FC, white); width: ${progress}%; border-radius: 8px; box-shadow: 0 0 20px rgba(255,255,255,0.4); transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);"></div>
                                </div>
                                
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 32px;">
                                    <div style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 16px;">
                                        <div style="background: rgba(255,255,255,0.2); width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                                            <i data-lucide="timer" style="color: white; width: 24px; height: 24px;"></i>
                                        </div>
                                        <div>
                                            <div style="font-size: 0.75rem; color: rgba(255,255,255,0.7); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px;">Estimated Wait Time</div>
                                            <div style="font-size: 1.25rem; font-weight: 800; color: white;">${waitTime} Minutes</div>
                                        </div>
                                    </div>
                                    <div style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 16px;">
                                        <div style="background: rgba(255,255,255,0.2); width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                                            <i data-lucide="bell" style="color: white; width: 24px; height: 24px;"></i>
                                        </div>
                                        <div>
                                            <div style="font-size: 0.75rem; color: rgba(255,255,255,0.7); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px;">Live Updates</div>
                                            <div style="font-size: 1.25rem; font-weight: 800; color: white;">Enabled</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div style="margin-top: 32px;">
                            <h4 style="margin-bottom: 16px; color: var(--text-secondary); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px;">Queue Path</h4>
                            <div style="display: flex; gap: 16px; overflow-x: auto; padding: 4px; scrollbar-width: none;">
                                ${generateQueueCards(activePath, serviceHistory, active.id)}
                            </div>
                        </div>

                        <div style="margin-top: 24px; background: white; border-radius: 20px; padding: 24px; box-shadow: var(--shadow-sm); border: 1px solid #F1F5F9;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                                <h3 style="font-size: 1.1rem; font-weight: 800;">While You Wait</h3>
                                <span style="font-size: 0.7rem; color: var(--text-muted); font-weight: 600;">Selected for your ${waitTime}m wait</span>
                            </div>
                            <div id="waitContentItems" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px;">
                                <!-- Wait Content Items will be loaded here -->
                            </div>
                        </div>
                    `;

                    // Fetch and render wait content
                    fetch('/api/wait-content')
                        .then(res => res.json())
                        .then(contents => {
                            const waitDiv = document.getElementById('waitContentItems');
                            if (waitDiv && contents.length > 0) {
                                waitDiv.innerHTML = contents.map(item => `
                                    <div onclick="window.open('${item.link}', '_blank')" style="padding: 16px; background: #F8FAFC; border-radius: 16px; border: 1px solid #E2E8F0; transition: all 0.3s ease; cursor: pointer;" onmouseover="this.style.borderColor='var(--primary)'" onmouseout="this.style.borderColor='#E2E8F0'">
                                        <div style="background: ${item.category === 'ARTICLE' ? '#EEF2FF' : (item.category === 'MUSIC' ? '#F0FDF4' : '#FFF7ED')}; width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; color: ${item.category === 'ARTICLE' ? 'var(--primary)' : (item.category === 'MUSIC' ? '#16A34A' : '#EA580C')};">
                                            <i data-lucide="${item.icon}" style="width: 20px;"></i>
                                        </div>
                                        <h4 style="font-size: 0.9rem; margin-bottom: 6px;">${item.title}</h4>
                                        <p style="font-size: 0.75rem; color: var(--text-secondary); line-height: 1.4;">${item.description}</p>
                                    </div>
                                `).join('');
                                lucide.createIcons();
                            }
                        });

                    if (active.status === 'SERVING') {
                        if (lastNotifiedPeopleAhead !== 0) {
                            showBigNotification("Your turn is here!", "Please proceed to the service location now.");
                            lastNotifiedPeopleAhead = 0;
                        }
                    } else if (active.status !== 'AWAY' && active.peopleAhead <= 2) {
                        if (lastNotifiedPeopleAhead !== active.peopleAhead) {
                            const msg = active.peopleAhead === 2 ?
                                "Your turn is approaching. Only 2 people ahead." :
                                "Next turn is yours. Please proceed to the service location.";
                            showNotification(msg);
                            lastNotifiedPeopleAhead = active.peopleAhead;
                        }
                    } else {
                        if (active.peopleAhead > 2 || active.status === 'AWAY') lastNotifiedPeopleAhead = -1;
                    }
                } else {
                    // Reset container to empty state if no active ticket
                    container.innerHTML = `
                        <div class="empty-state">
                            <i data-lucide="calendar" style="width: 48px; height: 48px; color: var(--text-muted); margin-bottom: 16px;"></i>
                            <h3>No Active Queue</h3>
                            <p style="color: var(--text-secondary); margin-bottom: 24px;">You haven't joined any queue yet.</p>
                            <a href="services.html" class="btn btn-primary">Join a Queue</a>
                        </div>
                    `;
                    lucide.createIcons();
                }

                // Recent History - Fetch global history for the current service if joined 
                let historyData = history.filter(t => t.status === 'COMPLETED');
                if (active) {
                    try {
                        const globalRes = await fetch(`/api/queues/service/history?serviceId=${active.service.id}`);
                        if (globalRes.ok) {
                            historyData = await globalRes.json();
                        }
                    } catch (e) { console.error("Global history fetch failed", e); }
                }

                const historyDiv = document.getElementById('recentHistory');
                if (historyData.length > 0) {
                    historyDiv.innerHTML = historyData.slice(0, 15).map(t => `
                    <div class="card" style="flex-direction: row; align-items: center; padding: 20px; margin-bottom: 16px; opacity: 0.8; transform: none;">
                        <div style="background: #E2E8F0; width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary);">
                             <i data-lucide="check-circle" style="width:20px;"></i>
                        </div>
                        <div style="margin-left: 20px; flex-grow: 1;">
                            <h4 style="margin: 0; font-size: 0.95rem;">${t.user ? t.user.name : 'Guest'}</h4>
                            <p style="margin: 0; font-size: 0.8rem; color: var(--text-secondary);">${t.queueNumber} • Completed at ${new Date(t.bookingDate).toLocaleTimeString()}</p>
                        </div>
                        <div style="font-weight: 700; font-size: 0.8rem; color: #16A34A; background: #DCFCE7; padding: 4px 10px; border-radius: 99px;">SERVED</div>
                    </div>
                   `).join('');
                }
                lucide.createIcons();

            } catch (err) {
                console.error(err);
            }
        }

        function generateQueueCards(activePath, serviceHistory, myId) {
            console.log("Generating Queue Cards:", { activePath, serviceHistory, myId });
            if (!Array.isArray(activePath) || activePath.length === 0) {
                return '<p style="color: var(--text-muted); font-size: 0.8rem;">Loading queue status...</p>';
            }
            let cards = [];

            // Add last 2 completed as "Done"
            if (Array.isArray(serviceHistory)) {
                const recentlyDone = serviceHistory.slice(0, 2).reverse();
                recentlyDone.forEach(t => {
                    cards.push(`
                        <div class="card" style="min-width: 120px; flex-shrink: 0; text-align: center; padding: 16px; opacity: 0.5; transform: none; background: #F8FAFC">
                            <div style="font-size: 0.7rem; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 4px;">Done</div>
                            <div style="font-size: 1.25rem; font-weight: 800; color: var(--text-muted)">${t.queueNumber}</div>
                        </div>
                    `);
                });
            }

            // Add all currently active (SERVING, WAITING, AWAY) in real order
            activePath.forEach(t => {
                const isServing = t.status === 'SERVING';
                const isMe = t.id === myId;
                const status = isServing ? 'Serving' : (isMe ? 'YOU' : (t.status === 'AWAY' ? 'Away' : 'Waiting'));

                cards.push(`
                    <div class="card" style="min-width: 120px; flex-shrink: 0; text-align: center; padding: 16px; opacity: 1; transform: none; border: 2px solid ${isMe ? 'var(--primary)' : (isServing ? 'var(--secondary)' : 'transparent')}; background: ${isMe ? '#EEF2FF' : 'white'}">
                        <div style="font-size: 0.7rem; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 4px;">${status}</div>
                        <div style="font-size: 1.25rem; font-weight: 800; color: ${isServing ? 'var(--secondary)' : 'var(--text-primary)'}">${t.queueNumber}</div>
                    </div>
                `);
            });

            return cards.join('');
        }

        function showBigNotification(title, msg) {
            if (document.getElementById('turnOverlay')) return;
            const overlay = document.createElement('div');
            overlay.id = 'turnOverlay';
            overlay.style = "position:fixed; inset:0; background:rgba(99, 102, 241, 0.95); z-index:10000; display:flex; align-items:center; justify-content:center; color:white; text-align:center; animation: fadeIn 0.5s ease;";
            overlay.innerHTML = `
                <div style="padding: 24px;">
                     <div style="background:white; color:var(--primary); width:80px; height:80px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin: 0 auto 24px; animation: pulse 2s infinite;">
                        <i data-lucide="bell" style="width:40px; height:40px;"></i>
                     </div>
                     <h1 style="font-size:3rem; margin-bottom:16px;">${title}</h1>
                     <p style="font-size:1.5rem; opacity:0.9; margin-bottom:40px;">${msg}</p>
                     <button class="btn btn-white" onclick="document.getElementById('turnOverlay').remove()" style="padding:16px 40px; font-size:1.1rem;">Got It!</button>
                </div>
            `;
            document.body.appendChild(overlay);
            lucide.createIcons();
            if (Notification.permission === "granted") new Notification(title, { body: msg });
        }

        async function boostTicket(ticketId) {
            try {
                const res = await fetch(`/api/queues/boost?ticketId=${ticketId}`, { method: 'POST' });
                if (res.ok) {
                    showNotification("Ticket Boosted! You are moving up the line.");
                    loadDashboard();
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function toggleAway(ticketId) {
            try {
                const res = await fetch(`/api/queues/toggle-away?ticketId=${ticketId}`, { method: 'POST' });
                if (res.ok) {
                    loadDashboard();
                }
            } catch (err) {
                console.error(err);
            }
        }

        function showNotification(msg) {
            if (!("Notification" in window)) return;
            if (Notification.permission === "granted") {
                new Notification(msg);
            } else if (Notification.permission !== "denied") {
                Notification.requestPermission();
            }
            const notifyDiv = document.createElement('div');
            notifyDiv.style = "position:fixed; top:16px; right:16px; background:var(--secondary); color:white; padding:12px 20px; border-radius:10px; z-index:9999; box-shadow:var(--shadow-lg); animation: slideIn 0.5s ease;";
            notifyDiv.innerHTML = `<strong>Attention:</strong> ${msg}`;
            document.body.appendChild(notifyDiv);
            setTimeout(() => notifyDiv.remove(), 5000);
        }

        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        setInterval(loadDashboard, 5000);
        loadDashboard();
    </script>
</body>

</html>
