<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Login – Nexio</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body style="background: #F8FAFC;">
    <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">
        <div class="card visible" style="max-width:400px; width:100%; padding:48px; border-radius:32px;">
            <div style="text-align: left; margin-bottom: 32px;">
                <div
                    style="background:var(--primary); color:white; width: 60px; height: 60px; border-radius:14px; display:flex; align-items:center; justify-content:center; margin-bottom: 24px; box-shadow: 0 8px 16px rgba(99, 102, 241, 0.2);">
                    <i data-lucide="briefcase" style="width: 28px; height: 28px;"></i>
                </div>
                <h2 style="font-size: 1.75rem; font-weight: 800; letter-spacing: -0.5px;">Agent Portal</h2>
                <p style="color:var(--text-secondary); margin-top: 8px;">Log in to manage your branch queues.</p>
            </div>
            <form id="loginForm">
                <div style="margin-bottom:20px;">
                    <label>Agent Email</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div style="margin-bottom:20px;">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;">Access Console</button>
                <div style="text-align:center; margin-top:20px;">
                    <a href="index.html" style="color:var(--text-secondary); font-size:0.9rem;">&larr; Return to
                        Home</a>
                </div>
            </form>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
