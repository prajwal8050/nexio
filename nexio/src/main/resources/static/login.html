<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Nexio</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .auth-card {
            background: var(--white);
            padding: 48px;
            border-radius: 32px;
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 480px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #E2E8F0;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }
    </style>
</head>

<body style="background: var(--bg-color);">

    <div class="auth-container">
        <div class="auth-card">
            <div style="text-align: left; margin-bottom: 32px;">
                <a href="index.html" class="logo" style="justify-content: flex-start;">
                    <i data-lucide="layers"></i>
                    <span>Nexio</span>
                </a>
                <h1 style="margin-top: 24px; font-size: 2rem; letter-spacing: -0.5px;">Welcome Back</h1>
                <p style="color: var(--text-secondary); font-size: 1.1rem;">Log in to manage your virtual queues.</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>

                <div style="text-align: right; margin-bottom: 24px;">
                    <a href="forgot_password.html"
                        style="font-size: 0.9rem; color: var(--primary); font-weight: 500;">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 16px;">Sign In</button>
            </form>

            <p style="text-align: center; margin-top: 24px; color: var(--text-secondary);">
                Don't have an account? <a href="register.html" style="color: var(--primary); font-weight: 600;">Sign
                    Up</a>
            </p>
        </div>
    </div>

    <!-- Simple Footer -->
    <footer style="margin-top: 40px; padding: 40px 0; border-top: 1px solid #E2E8F0; text-align: center;">
        <div class="container"
            style="display: flex; justify-content: center; gap: 40px; font-size: 0.9rem; color: var(--text-secondary);">
            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="agent_login.html" style="font-weight: 600;">Agent Login</a>
            <a href="admin_login.html" style="font-weight: 600;">Admin Login</a>
        </div>
    </footer>

    <script src="js/auth.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
